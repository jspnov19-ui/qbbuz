<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Buzz App</h1>

<div class="card">
  <button class="primary" onclick="location.href='join.html'">
    Join Game
  </button>

  <button class="primary" onclick="createGame()">
    Create Game
  </button>

  <p id="code"></p>
</div>

<script type="module">
import { supabase } from "./supabase.js";

function genCode() {
  return Math.random().toString(36).substring(2, 7).toUpperCase();
}

window.createGame = async function () {
  const code = genCode();

  await supabase.from("games").insert({
    id: code,
    buzz_locked: false,
    current_buzzer: null,
    timer_seconds: 30,
    timer_running: false
  });

  localStorage.setItem("room", code);
  location.href = "moderator.html";
};
</script>

</body>
</html>
